<!DOCTYPE html>
<html lang="de" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kenku Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Verhindert störendes Browser-Verhalten auf Mobilgeräten */
        body { overscroll-behavior-y: contain; touch-action: manipulation; }
        
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple-animation 0.6s ease-out;
            pointer-events: none;
        }
        
        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-6 font-sans antialiased selection:bg-blue-500/30">

    <div class="max-w-4xl mx-auto">
        
        <header class="mb-8 flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl border border-slate-800 shadow-xl backdrop-blur-sm">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
                Kenku Soundboard
            </h1>
            
            <button 
                onclick="loadSounds()"
                class="p-2 sm:px-4 sm:py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl transition-all duration-200 active:scale-95 flex items-center gap-2"
                title="Sounds neu laden"
            >
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </header>

        <div id="grid" class="grid grid-cols-3 gap-3 sm:grid-cols-4 md:grid-cols-5 pb-8">
            <div class="col-span-full text-center text-blue-400 py-10 animate-pulse">
                Verbinde...
            </div>
        </div>
    </div>

    <script>
        // Nutzt den Nginx-Proxy (relativer Pfad)
        const getApiUrl = () => '/v1/soundboard';

        function getColorFromName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 85%, 55%)`;
        }

        async function loadSounds() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="col-span-full text-center text-blue-400 py-10 animate-pulse">Lade Sounds...</div>';
            
            try {
                const response = await fetch(getApiUrl());
                if (!response.ok) throw new Error('Netzwerk-Antwort war nicht ok');
                
                const data = await response.json();
                grid.innerHTML = '';
                
                if (data.soundboards && data.soundboards.length > 0) {
                    const soundsMap = {};
                    if (data.sounds) {
                        data.sounds.forEach(sound => {
                            soundsMap[sound.id] = sound;
                        });
                    }
                    
                    data.soundboards.sort((a, b) => a.title.localeCompare(b.title, 'de'));
                    
                    data.soundboards.forEach(soundboard => {
                        const section = document.createElement('div');
                        section.className = 'col-span-full mb-6';
                        
                        const boardColor = getColorFromName(soundboard.title);
                        
                        const title = document.createElement('h2');
                        title.className = 'text-xl font-bold mb-3 px-2';
                        title.style.color = boardColor;
                        title.textContent = soundboard.title;
                        section.appendChild(title);
                        
                        const soundsGrid = document.createElement('div');
                        soundsGrid.className = 'grid grid-cols-3 gap-3 sm:grid-cols-4 md:grid-cols-5';
                        
                        const boardSounds = [];
                        if (soundboard.sounds) {
                            soundboard.sounds.forEach(soundId => {
                                const sound = soundsMap[soundId];
                                if (sound) {
                                    boardSounds.push(sound);
                                }
                            });
                        }
                        
                        boardSounds.sort((a, b) => a.title.localeCompare(b.title, 'de'));
                        
                        boardSounds.forEach(sound => {
                            const btn = document.createElement('button');
                            btn.className = 'group relative flex flex-col items-center justify-center p-4 min-h-[100px] bg-slate-900 hover:bg-slate-800 border-2 border-slate-800 hover:border-blue-500/50 rounded-2xl transition-all duration-200 active:scale-95 shadow-lg overflow-hidden';
                            btn.style.borderColor = boardColor;
                            
                            btn.innerHTML = `
                                <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <span class="text-base sm:text-lg font-medium text-slate-300 group-hover:text-white text-center break-words z-10 transition-colors">${sound.title}</span>
                            `;
                            
                            btn.onclick = (e) => {
                                const ripple = document.createElement('span');
                                ripple.className = 'ripple';
                                const rect = btn.getBoundingClientRect();
                                const size = Math.max(rect.width, rect.height);
                                ripple.style.width = ripple.style.height = size + 'px';
                                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                                btn.appendChild(ripple);
                                setTimeout(() => ripple.remove(), 600);
                                playSound(sound.id);
                            };
                            soundsGrid.appendChild(btn);
                        });
                        
                        section.appendChild(soundsGrid);
                        grid.appendChild(section);
                    });
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">Keine Sounds gefunden.</div>';
                }
            } catch (err) {
                grid.innerHTML = '<div class="col-span-full text-center text-red-400 py-10 bg-red-950/20 border border-red-900/50 rounded-2xl">Verbindungsfehler. Läuft Kenku Remote und der Docker-Proxy?</div>';
                console.error(err);
            }
        }

        async function playSound(soundId) {
            try {
                await fetch(`${getApiUrl()}/play`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: soundId })
                });
            } catch (err) {
                console.error('Fehler beim Abspielen', err);
            }
        }

        // --- Screen Wake Lock API ---
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock aktiv.');
                }
            } catch (err) {
                console.warn(`Wake Lock blockiert: ${err.message}`);
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // Automatisch beim Öffnen der Seite ausführen
        window.onload = () => {
            loadSounds();
            requestWakeLock();
        };
    </script>
</body>
</html>
